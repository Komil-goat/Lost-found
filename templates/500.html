<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internal Server Error</title>
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding-top: 80px; color: #343a40; }
        .container { border: 1px solid #dee2e6; display: inline-block; padding: 40px; background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 90%; width: 450px; }
        h1 { color: #dc3545; font-size: 2rem; margin-top: 0; }
        p { margin-bottom: 25px; line-height: 1.5; }
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        .btn { text-decoration: none; padding: 12px 20px; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
        .btn-primary { background-color: #007bff; color: white; }
        .btn-primary:hover { background-color: #0056b3; }
        .btn-outline { border: 1px solid #6c757d; color: #6c757d; }
        .btn-outline:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Something went wrong</h1>
        <p>Our server hit a snag. This usually happens when an item's data couldn't be loaded or there's a temporary connection issue.</p>
        
        <div class="btn-group">
            <a href="/accounts/login/" class="btn btn-primary">Go to Login Page</a>
            
            <a href="javascript:location.reload();" class="btn btn-outline">Try Refreshing the Page</a>
        </div>
        
        <p style="margin-top: 25px; font-size: 0.85rem; color: #adb5bd;">
            If you keep seeing this, the "Lost & Found" is probably already debugging it.
        </p>
    </div>
</body>
</html>
