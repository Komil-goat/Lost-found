<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found</title>
    <style>
        /* Simple Flexbox Navbar */
        .navbar {
            display: flex;
            justify-content: space-between; /* This pushes brand left and profile right */
            align-items: center;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px; /* Space between username and logout button */
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <strong>Lost & Found</strong>
        </div>

        <div class="profile-section">
            {% if user.is_authenticated %}
            <span><strong>{{ user.username }}</strong></span>
        
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Log Out</button>
            </form>
            {% endif %}
        </div>
    </nav>

    <div style="padding: 20px; text-align: center;">
        <h1>Welcome to the Lost and Found App!</h1>
    </div>

</body>
</html>
