<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost and Found</title>
    <style>
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #2c3e50;
            color: white;
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 15px; 
        }

        .logout-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 8px 15px;
            cursor: pointer;
            border-radius: 4px;
            text-decoration: none;
        }

        .logout-btn:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <strong>Lost & Found</strong>
        </div>

        <div class="profile-section">
            {% if user.is_authenticated %}
            <span><strong>{{ user.username }}</strong></span>
        
            <form action="{% url 'logout' %}" method="post" style="display:inline;">
                {% csrf_token %}
                <button type="submit" class="logout-btn">Log Out</button>
            </form>
            {% endif %}
        </div>
    </nav>

    <div style="padding: 20px; text-align: center;">
        <h1>Welcome to the Lost and Found App!</h1>
    </div>

    <div style="margin-top: 40px; display: flex; justify-content: center; gap: 30px;">

    <a href="{% url 'lost_list' %}" style="
        padding: 20px 40px;
        background-color: #e74c3c;
        color: white;
        text-decoration: none;
        font-size: 20px;
        border-radius: 10px;
        font-weight: bold;
    ">
        Lost Items
    </a>

    <a href="{% url 'found_list' %}" style="
        padding: 20px 40px;
        background-color: #2ecc71;
        color: white;
        text-decoration: none;
        font-size: 20px;
        border-radius: 10px;
        font-weight: bold;
    ">
        Found Items
    </a>

</div>

</body>
</html>
