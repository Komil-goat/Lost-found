{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Lost & Found</title>
    <link rel="stylesheet" href="{% static 'users/css/style.css' %}">
    <link rel="icon" href="data:,">
</head>
<body>

    <div class="auth-card">
        <h2>Welcome back</h2>
        <p class="subtitle">Please enter your details to sign in.</p>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="password-toggle-container">
                <input type="checkbox" id="togglePassword"> 
                <label for="togglePassword" style="margin: 0;">Show Password</label>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
        </form>

        <div class="auth-footer">
            <p style="color: var(--text-muted); font-size: 0.875rem;">Don't have an account?</p>
            <a href="{% url 'register' %}" class="btn btn-outline">Create account</a>
        </div>
    </div>
    <script src="{% static 'users/js/password.js' %}"></script>
</body>
</html>
