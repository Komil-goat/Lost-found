<!DOCTYPE html>
<html>
<head>
    <title>Login - Lost and Found</title>
</head>
<body>
    <h2>Login to Lost and Found</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log In</button>
    </form>

    <hr> <p>Don't have an account?</p>
    <a href="{% url 'register' %}">
        <button type="button">Register New Account</button>
    </a>
</body>
</html>
