{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Lost & Found</title>
    <link rel="stylesheet" href="{% static 'users/css/style.css' %}">
</head>
<body>

    <div class="auth-card">
        <h2>Join the community</h2>
        <p class="subtitle">Help others or find your lost items.</p>
        
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            
            <button type="submit" class="btn btn-primary">Create Account</button>
        </form>

        <div class="auth-footer">
            <p style="color: var(--text-muted); font-size: 0.875rem;">Already have an account?</p>
            <a href="{% url 'login' %}" class="btn btn-outline">Sign In</a>
        </div>
    </div>

</body>
</html>
